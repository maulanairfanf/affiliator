services:
  postgres:
    image: postgres:16
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: affiliator
      POSTGRES_USER: affiliator
      POSTGRES_PASSWORD: affiliator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affiliator -d affiliator"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
